# Analysis configuration and paths
project_name: "finemapping-analysis"
version: "0.1.0"
results_dir: "results"  # Absolute path to results directory



# Default resources
default_resources:
  mem_mb: 32000
  cores: 2
  time: "00:30:00"

# First-step pipeline settings
first_step:
  panel_file: "resources/1000g_phase3/panel/integrated_call_samples_v3.20130502.ALL.panel"
  output_dir: "results/reference_panel_prep"
  populations: ["YRI", "PEL", "CEU"]
  ancestry_labels:
    YRI: "AFR"
    PEL: "AMR"
    CEU: "EUR"

# Step 2: subset 1000G reference VCFs to YRI/PEL/CEU samples
step2:
  reference_release_dir: "resources/1000g_phase3/release_20130502"
  sample_list: "results/reference_panel_prep/YRI_PEL_CEU.samples.txt"
  output_dir: "results/reference_panel_subset"
  output_suffix: "YRI_PEL_CEU"

# Step 3: subset cohort PLINK data using loci boundaries and export chr-based VCFs
step3:
  plink_prefix: "input/LAMR"
  loci_file: "input/loci.txt"
  output_dir: "results/cohort_region_subset"
  output_suffix: "loci"

# Step 4: phase cohort VCFs per chromosome for RFMix input
step4:
  cohort_input_pattern: "results/cohort_region_subset/chr{chr}.loci.vcf.gz"
  reference_vcf_pattern: "results/reference_panel_subset/chr{chr}.YRI_PEL_CEU.vcf.gz"
  genetic_map_pattern: "resources/geneticmaps37/chr{chr}.b37.gmap.gz"
  output_dir: "results/cohort_phasing"

# Step 5: run RFMix local ancestry per chromosome
step5:
  cohort_phased_pattern: "results/cohort_phasing/chr{chr}.phased.vcf.gz"
  reference_vcf_pattern: "results/reference_panel_subset/chr{chr}.YRI_PEL_CEU.vcf.gz"
  genetic_map_pattern: "resources/geneticmaps37/chr{chr}.b37.gmap.gz"
  sample_map_file: "results/reference_panel_prep/YRI_PEL_CEU.sample_map.txt"
  sample_map_label_codes:
    AFR: "0"
    AMR: "1"
    EUR: "2"
  output_dir: "results/rfmix"

# Step 6: plot chromosome-level local ancestry tracts from RFMix MSP output
step6:
  rfmix_msp_pattern: "results/rfmix/chr{chr}.deconvoluted.msp.tsv"
  output_dir: "results/rfmix_plots"
  output_prefix_pattern: "chr{chr}.rfmix_ancestry_tracts"
  ancestry_labels:
    "0": "AFR"
    "1": "AMR"
    "2": "EUR"
  ancestry_colors:
    AFR: "#1f77b4"
    AMR: "#ff7f0e"
    EUR: "#2ca02c"

# Step 7: bin chromosome into windows, compare case/control stacked ancestry, and annotate genes per bin
step7:
  rfmix_msp_pattern: "results/rfmix/chr{chr}.deconvoluted.msp.tsv"
  output_dir: "results/rfmix_bin_case_control"
  output_prefix_pattern: "chr{chr}.rfmix_case_control_bins"
  bin_size_bp: 250000
  gene_annotation_file: "resources/NCBI37.3.gene.loc"
  max_genes_per_bin_label: 3
  phenotype_file: "input/LAMR.fam"
  phenotype_format: "fam"  # fam|table
  fam_case_code: "2"
  fam_control_code: "1"
  table_sample_column: "IID"
  table_status_column: "PHENO"
  table_case_value: "case"
  table_control_value: "control"
  ancestry_labels:
    "0": "AFR"
    "1": "AMR"
    "2": "EUR"
  ancestry_colors:
    AFR: "#1f77b4"
    AMR: "#ff7f0e"
    EUR: "#2ca02c"

# Step 8: correlate PRS with per-chromosome RFMix .Q ancestry contributions
step8:
  rfmix_q_pattern: "results/rfmix/chr{chr}.deconvoluted.rfmix.Q"
  ancestry_contribution_bins: 10
  phenotype_file: "input/LAMR.fam"
  phenotype_format: "fam"   # currently fam supported for stratified case/control correlation
  fam_case_code: "2"
  fam_control_code: "1"
  prs_file: "input/LAMR_PRS_using_MEX.txt"
  prs_iid_column: "IID"
  prs_score_column: "PRS"
  prs_in_regression_column: "In_Regression"
  prs_in_regression_keep_value: "Yes"
  output_dir: "results/rfmix_prs_correlation"
  per_chr_prefix_pattern: "chr{chr}.rfmix_prs_correlation"
  matrix_prefix: "rfmix_prs_r2_matrix"
  ancestry_labels:
    "0": "AFR"
    "1": "AMR"
    "2": "EUR"
  ancestry_colors:
    AFR: "#1f77b4"
    AMR: "#ff7f0e"
    EUR: "#2ca02c"

# Tractor: extract ancestry-specific tracts and dosage from phased VCF + MSP
tractor:
  vcf_pattern: "results/cohort_phasing/chr{chr}.phased.vcf.gz"
  msp_pattern: "results/rfmix/chr{chr}.deconvoluted.msp.tsv"
  num_ancs: 3
  output_dir: "results/tractor"
  output_vcf: false
  compress_output: false

# Tractor GWAS: pairwise ancestry combinations, per chromosome then merged + plotted
tractor_gwas:
  extract_output_dir: "results/tractor"
  phenotype_file: "input/LAMR.fam"
  phenotype_format: "fam"   # fam|table
  fam_case_code: "2"
  fam_control_code: "1"
  table_iid_column: "IID"
  table_phenotype_column: "PHENO"
  output_dir: "results/tractor_gwas"
  per_chr_prefix_pattern: "chr{chr}.model_{pair}"
  merged_prefix_pattern: "merged.model_{pair}"
  ancestry_labels:
    "0": "AFR"
    "1": "AMR"
    "2": "EUR"
  min_partitions: 32

annotation_meta:
  annotation: "resources/NCBI37.3.gene.loc"

maf_summary:
  output_dir: "results/maf_summary"

maf_gwas_summary:
  output_dir: "results/maf_gwas_summary"

locus_ancestry_report:
  input_tsv: "results/maf_gwas_summary/merged.maf_gwas_summary.tsv"
  output_dir: "results/locus_ancestry_report"
  cohort_maf_min: 0.01           # keep SNPs with at least 1% cohort MAF
  ancestry_maf_min: 0.01         # and at least 1% MAF in at least one ancestry
  max_p_dosage: 0.01             # exploratory ancestry-specific dosage evidence threshold
  min_or_dosage_deviation: 0.10  # require OR <= 0.90 or >= 1.10
  max_p_local_ancestry: 0.05     # supportive local ancestry evidence threshold
  min_or_local_deviation: 0.05   # require local ancestry OR <= 0.95 or >= 1.05
  min_supporting_snps: 1         # SNPs needed to call an ancestry active for a locus
  clustering_method: "ward"     # hierarchical clustering linkage for the locus dendrogram
  clustering_metric: "euclidean" # distance metric for locus clustering