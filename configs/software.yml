# Software modules and tool configurations
plink2:
  module: "plink2/2.00a3.3lm"
  version: "2.00a3.3lm"
  params:
    memory: "--memory 32000"
    threads: "--threads 2"

r:
  module: "R/4.4.1-mkl bioconductor/3.19"
  version: "4.4.1"
  params:
    r_libs_user: "~/R/packages:/usr/local/analysis/bioconductor/3.19/R/library:/usr/local/analysis/R/4.4.1-mkl/lib/R/library"

python:
  module: "python/3.10.2"
  version: "3.10.2"

bcftools:
  module: "bcftools"
  version: "1.9"
  params:
    output_type: "-O z"
    threads: "--threads 2"

shapeit5:
  module: "shapeit5"
  version: "latest"
  params:
    threads: "--thread 2"

rfmix:
  module: "rfmix2"
  version: "latest"

admixture:
  module: "admixture/1.3.0"
  version: "1.3.0"
